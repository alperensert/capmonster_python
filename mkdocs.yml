site_name: Capmonster Python
site_url: https://yourusername.github.io/capmonster-python
repo_url: https://github.com/yourusername/capmonster-python
repo_name: capmonster-python

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.action.edit
    - search.suggest

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [ src ]
          options:
            docstring_style: google
            show_source: false
            show_signature: true
            separate_signature: true
            show_root_heading: true
            filters: [ "!^_" ]

markdown_extensions:
  - admonition
  - toc:
      permalink: "#"
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.critic
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets

nav:
  - Home:
      - Welcome: index.md
      - Installation: installation.md
      - Examples: examples.md
      - Error Codes: error_codes.md
  - API Reference:
      - Overview: reference/overview.md
      - CapmonsterClient: reference/client.md
      - reCAPTCHA: reference/recaptcha.md
      - Turnstile: reference/turnstile.md
      - GeeTest: reference/geetest.md
      - Image-Based: reference/image.md
      - Enterprise: reference/enterprise.md
      - Platform Specific: reference/platform.md
      - Miscellaneous: reference/miscellaneous.md
      - Abstract: reference/abstract.md
      - Exceptions: reference/exceptions.md
